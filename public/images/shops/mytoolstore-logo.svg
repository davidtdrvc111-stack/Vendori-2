<svg viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Swoosh Gradient -->
    <radialGradient id="swoosh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E0E0E0;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#BDBDBD;stop-opacity:0.6" />
    </radialGradient>
  </defs>

  <!-- Gray Swoosh Ellipse -->
  <ellipse
    cx="250"
    cy="80"
    rx="240"
    ry="75"
    fill="url(#swoosh)"
  />

  <!-- Text: myToolStore -->
  <g font-family="Arial Black, Arial, sans-serif" font-size="68">
    <!-- "my" - Regular weight, Black -->
    <text x="15" y="105" fill="#000000" font-weight="900" style="font-style: italic;">my</text>

    <!-- "Tool" - Bold weight, Blue -->
    <text x="120" y="105" fill="#1E88E5" font-weight="900" style="font-style: italic;">Tool</text>

    <!-- "Store" - Bold weight, Black -->
    <text x="300" y="105" fill="#000000" font-weight="900" style="font-style: italic;">Store</text>
  </g>
</svg>
