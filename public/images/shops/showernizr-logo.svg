<svg viewBox="0 0 500 220" xmlns="http://www.w3.org/2000/svg">
  <!-- 3D Niche Frame Icon -->
  <g transform="translate(150, 20)">
    <!-- Back/Shadow face of the 3D frame -->
    <rect
      x="0"
      y="0"
      width="200"
      height="110"
      fill="none"
      stroke="#000000"
      stroke-width="18"
      rx="6"
    />

    <!-- Front face (offset for 3D depth effect) -->
    <rect
      x="25"
      y="18"
      width="200"
      height="110"
      fill="#FFFFFF"
      stroke="#000000"
      stroke-width="20"
      rx="6"
    />

    <!-- Inner rectangle (the niche/opening) -->
    <rect
      x="50"
      y="38"
      width="150"
      height="70"
      fill="none"
      stroke="#000000"
      stroke-width="12"
      rx="3"
    />
  </g>

  <!-- Text: sHowerNIZR -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="52">
    <!-- "s" - Light weight -->
    <text x="15" y="190" fill="#000000" font-weight="300">s</text>

    <!-- "H" - Bold weight -->
    <text x="45" y="190" fill="#000000" font-weight="700">H</text>

    <!-- "ower" - Light weight -->
    <text x="95" y="190" fill="#000000" font-weight="300">ower</text>

    <!-- "NIZR" - Bold weight, uppercase -->
    <text x="250" y="190" fill="#000000" font-weight="700" letter-spacing="2">NIZR</text>
  </g>
</svg>
